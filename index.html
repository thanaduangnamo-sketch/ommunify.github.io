<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครบัญชี - OMMUNIFY</title>
    <!-- โหลดไลบรารี API ของ Google -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #ffffff;
            background-image: 
                radial-gradient(circle at 80% 20%, #e0f2fe 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, #bae6fd 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(14, 165, 233, 0.2);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.1);
            text-align: center;
        }

        .top-title-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: 50px;
            margin-bottom: 30px;
            cursor: default;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #0369a1;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            background-color: #ffffff;
        }

        .input-group input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .confirm-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.3s;
            margin-top: 10px;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            background: #e2e8f0;
            height: 1px;
        }

        .divider span {
            padding: 0 10px;
        }

        /* กล่องสำหรับใส่ปุ่มแท้ของ Google API */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <button class="top-title-btn">สมัครบัญชี</button>

        <form onsubmit="handleSubmit(event)">
            <div class="input-group">
                <label for="name">ชื่อผู้ใช้งาน</label>
                <input type="text" id="name" required placeholder="กรอกชื่อของคุณ">
            </div>

            <div class="input-group">
                <label for="email">อีเมล</label>
                <input type="email" id="email" required placeholder="example@mail.com">
            </div>

            <button type="submit" class="confirm-btn">ยืนยันการสมัคร</button>
        </form>

        <div class="divider">
            <span>หรือ</span>
        </div>

        <!-- ปุ่ม Google แบบ Official จาก API ที่ระบบจะสร้างขึ้นให้อัตโนมัติ -->
        <div class="google-btn-wrapper">
            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="continue_with"
                 data-size="large"
                 data-logo_alignment="left"
                 data-width="340">
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันถอดรหัส Token ที่ Google ส่งกลับมา (JWT) เพื่อเอาข้อมูลโปรไฟล์
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('0' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // ฟังก์ชันทำงานเมื่อผู้ใช้ล็อกอินผ่าน Google สำเร็จ
        function handleCredentialResponse(response) {
            try {
                // ดึงข้อมูลโปรไฟล์จาก Google Token
                const responsePayload = parseJwt(response.credential);
                
                // เอาชื่อและอีเมลจาก Google มากรอกในช่อง Input ให้ทันที
                document.getElementById('name').value = responsePayload.name;
                document.getElementById('email').value = responsePayload.email;
                
                alert(`ดึงข้อมูลจาก Google สำเร็จ!\nยินดีต้อนรับคุณ: ${responsePayload.name}`);
            } catch (error) {
                console.error("Error parsing Google response:", error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อกับ Google");
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            alert(`สมัครบัญชีสำเร็จ!\nชื่อ: ${name}\nอีเมล: ${email}`);
        }
    </script>
</body>
</html>
